[package]
name = "sitelens-api"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.8"
async-graphql = "7"
async-graphql-axum = "7"
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
] }
serde_json = "1"
tower-http = { version = "0.6", features = ["cors"] }

[profile.release]
opt-level = 2
