"""
An inbound as-built import + comparison run (snapshots the tolerance spec).
"""
type AsBuiltBatch {
	id: UUID!
	projectId: UUID!
	sourceFilename: String!
	format: FieldFormat!
	baselineScope: BaselineScope!
	baselineRefId: UUID
	deltaSpace: String!
	tolHWarn: Float!
	tolHFail: Float!
	tolVWarn: Float!
	tolVFail: Float!
	reportUnit: LengthUnit!
	createdAt: DateTime!
}

"""
The design-point set an as-built import is compared against.
"""
enum BaselineScope {
	ALL
	CATEGORY
	GROUP
}

"""
The org's billing posture for the client: plan, status, usage, and limits
(`-1` = unlimited). Drives the upgrade gate, caps, and the Billing settings page.
"""
type BillingInfo {
	"""
	"solo" (free) or "crew" (paid).
	"""
	plan: String!
	status: String
	currentPeriodEnd: DateTime
	cancelAtPeriodEnd: Boolean!
	"""
	Read-only lock (lapsed sub over the Solo caps).
	"""
	restricted: Boolean!
	canExport: Boolean!
	projects: Int!
	admins: Int!
	nonAdmin: Int!
	maxProjects: Int!
	maxAdmins: Int!
	maxNonAdmin: Int!
	"""
	Emails of this org's admins, so non-admin members can reach out about
	upgrading/managing the subscription.
	"""
	adminEmails: [String!]!
}

"""
Billing interval for a Crew subscription.
"""
enum BillingInterval {
	MONTHLY
	ANNUAL
}

"""
A georeferenced DXF overlay. The raw file lives in storage (key not exposed).
"""
type CadOverlay {
	id: UUID!
	projectId: UUID!
	originalFilename: String!
	offsetE: Float!
	offsetN: Float!
	rotationDeg: Float!
	scale: Float!
	"""
	Flat placement height (meters) in the project's vertical datum.
	"""
	elevation: Float!
	assumeRealWorld: Boolean!
	visible: Boolean!
}

"""
Which point attribute becomes the exported feature code.
"""
enum CodeField {
	"""
	The point's free-text description (default).
	"""
	DESCRIPTION
	"""
	The point's category name.
	"""
	CATEGORY
}

"""
A full comparison: batch metadata + per-point rows + summary.
"""
type Comparison {
	batch: AsBuiltBatch!
	rows: [ComparisonRow!]!
	summary: ComparisonSummary!
}

"""
One paired/unpaired as-built point. Coords + deltas are canonical meters
(projected-ground frame for the primary deltas, building-grid for the grid
deltas); the client converts to `AsBuiltBatch.reportUnit`.
"""
type ComparisonRow {
	id: UUID!
	asBuiltLabel: String!
	asBuiltN: Float!
	asBuiltE: Float!
	asBuiltZ: Float
	designPointId: UUID
	designN: Float
	designE: Float
	designZ: Float
	matchMethod: FieldMatchMethod!
	deltaN: Float
	deltaE: Float
	deltaZ: Float
	deltaHRadial: Float
	deltaGridN: Float
	deltaGridE: Float
	status: ComparisonStatus!
	asBuiltLatitude: Float
	asBuiltLongitude: Float
	asBuiltHeight: Float
	designLatitude: Float
	designLongitude: Float
	designHeight: Float
}

"""
Tolerance classification of a compared point.
"""
enum ComparisonStatus {
	PASS
	WARN
	FAIL
	UNMATCHED
	NO_VERTICAL
}

"""
Rollup counts + horizontal miss stats for a comparison.
"""
type ComparisonSummary {
	pass: Int!
	warn: Int!
	fail: Int!
	unmatched: Int!
	noVertical: Int!
	maxMiss: Float
	rmsMiss: Float
}

"""
A city-published control point. Coordinates are meters. `grid_x`/`grid_y` are
the point's location in building-grid space, used to solve the transform.
"""
type ControlPoint {
	id: UUID!
	projectId: UUID!
	label: String!
	northing: Float!
	easting: Float!
	elevation: Float
	gridX: Float
	gridY: Float
	source: String!
}

"""
All derivable representations of a coordinate. Linear fields are meters;
latitude/longitude are degrees. `None` where a representation isn't derivable.
"""
type CoordinateSet {
	gridX: Float
	gridY: Float
	projectedGridE: Float
	projectedGridN: Float
	projectedGroundE: Float
	projectedGroundN: Float
	latitude: Float
	longitude: Float
}

"""
The space an input coordinate is expressed in (GraphQL enum).
"""
enum CoordinateSpace {
	GRID
	PROJECTED
	"""
	Geographic input: `x` is longitude, `y` is latitude (degrees); `unit` is
	ignored. Derives projected/grid/ground via the project's CRS + transform.
	"""
	GEOGRAPHIC
}

"""
CSV column mapping (0-based indices).
"""
input CsvMappingInput {
	hasHeader: Boolean!
	labelCol: Int
	northingCol: Int!
	eastingCol: Int!
	elevationCol: Int
	descriptionCol: Int
}

"""
Implement the DateTime<Utc> scalar

The input/output is a string in RFC3339 format.
"""
scalar DateTime

"""
Result of auto-detecting an uploaded file's format.
"""
type DetectedFormat {
	format: FieldFormat!
	"""
	CSV needs a preset/column mapping chosen before import.
	"""
	needsMapping: Boolean!
}

"""
Server-parsed geometry of a DXF overlay (replaces client-side parsing).
"""
type DxfGeometry {
	layers: [String!]!
	polylines: [DxfPolylineGql!]!
}

"""
A 2D point in DXF drawing units.
"""
type DxfPoint {
	x: Float!
	y: Float!
}

"""
A layer-grouped polyline of a parsed DXF overlay.
"""
type DxfPolylineGql {
	layer: String!
	points: [DxfPoint!]!
}

"""
An EPSG coordinate-reference-system entry for the picker.
"""
type EpsgEntry {
	code: Int!
	name: String!
}

"""
A selectable CSV column (caller chooses inclusion + order).
"""
enum ExportColumn {
	POINT
	NORTHING
	EASTING
	ELEVATION
	DESCRIPTION
	LATITUDE
	LONGITUDE
}

enum ExportFormat {
	CSV
	LANDXML
}

"""
Which coordinate space the exported northing/easting are in.
"""
enum ExportSpace {
	PROJECTED_GRID
	PROJECTED_GROUND
	GRID
	GEOGRAPHIC
}

"""
An encoded field file ready for download.
"""
type FieldExportResult {
	filename: String!
	mimeType: String!
	contentBase64: String!
}

"""
The field file formats SiteLens can encode and decode.
"""
enum FieldFormat {
	CSV
	LAND_XML
	JOB_XML
}

"""
How an as-built row was paired to a design point.
"""
enum FieldMatchMethod {
	NUMBER
	MANUAL
	UNMATCHED
}

"""
A curated field-app export preset, surfaced to the client for the picker.
"""
type FieldPresetInfo {
	id: String!
	app: String!
	format: FieldFormat!
	defaultSpace: ExportSpace!
	defaultUnit: LengthUnit!
	description: String!
}

"""
A generated downloadable artifact (foundation §12): reports, exports, etc.
"""
type FileBlob {
	filename: String!
	mimeType: String!
	contentBase64: String!
}

"""
A single grid axis. `position` is in meters (grid space).
"""
type GridAxis {
	id: UUID!
	projectId: UUID!
	family: GridFamily!
	label: String!
	position: Float!
}

"""
Input for replacing the grid. `position` is expressed in `unit`.
"""
input GridAxisInput {
	family: GridFamily!
	label: String!
	position: Float!
}

"""
Which family a grid axis belongs to.
"""
enum GridFamily {
	LETTERED
	NUMBERED
}

"""
A record of one import.
"""
type ImportBatch {
	id: UUID!
	projectId: UUID!
	sourceFilename: String!
	format: String!
	rowCount: Int!
}

"""
Import file format.
"""
enum ImportFormat {
	CSV
	LANDXML
}

"""
A reusable CSV import column mapping. `mapping_json` is the serialized mapping.
"""
type ImportProfile {
	id: UUID!
	projectId: UUID!
	name: String!
	unit: LengthUnit!
	mappingJson: String!
}

"""
Result returned from inviting a user. The invite token is surfaced for the
same reason as above (no email provider yet).
"""
type InviteResult {
	user: User!
	inviteToken: String!
}

"""
A geographic position (degrees) with height in meters.
"""
type LatLng {
	latitude: Float!
	longitude: Float!
	height: Float!
}

"""
A length unit used at I/O boundaries. The canonical internal unit is meters.
"""
enum LengthUnit {
	US_SURVEY_FOOT
	INTERNATIONAL_FOOT
	METER
}

"""
The GraphQL mutation root — a merge of the per-domain mutation objects.
"""
type MutationRoot {
	"""
	Self-service signup: creates a new organization and its first Admin user
	(unverified). Returns the verification token (delivered by email later).
	"""
	signup(email: String!, password: String!, orgName: String!): SignupResult!
	"""
	Verifies an email address using the token issued at signup.
	"""
	verifyEmail(token: String!): Boolean!
	"""
	Re-issues + re-sends a verification email for an unverified account. Always
	returns true (no account-existence leak). Rate-limited.
	"""
	resendVerification(email: String!): Boolean!
	"""
	Logs in with email + password. Sets an HTTP-only session cookie.
	"""
	login(email: String!, password: String!): User!
	"""
	Clears the session cookie.
	"""
	logout: Boolean!
	"""
	Invites a user into the caller's organization. Admin only. Returns the
	invite token (delivered by email later).
	"""
	inviteUser(email: String!, role: Role!): InviteResult!
	"""
	Accepts an invite: sets the password, verifies the email, and logs in.
	"""
	acceptInvite(token: String!, password: String!): User!
	"""
	Changes a user's role within the caller's organization. Admin only.
	"""
	updateUserRole(userId: UUID!, role: Role!): User!
	"""
	Removes a user from the caller's org. Admin only; cannot remove the last
	admin (an admin may remove themselves only if another admin remains).
	"""
	removeUser(userId: UUID!): Boolean!
	"""
	Permanently deletes the caller's entire organization — this *closes the
	account*. Every project (and all its uploaded files), every user, and all
	org data is removed; nothing is left behind. Admin only. Clears the
	caller's session since their account no longer exists.
	"""
	deleteOrganization: Boolean!
	"""
	Admin-initiated reset: emails the user a one-time reset link. Admin only.
	"""
	adminResetPassword(userId: UUID!): Boolean!
	"""
	Self-service: emails a reset link if the address has a password. Always
	returns true (no account-existence leak). Rate-limited.
	"""
	requestPasswordReset(email: String!): Boolean!
	"""
	Consumes a reset token and sets a new password (also marks the email
	verified — possessing the token proves control of the inbox).
	"""
	resetPassword(token: String!, newPassword: String!): Boolean!
	"""
	Creates a project in the caller's organization. Editor role required.
	"""
	createProject(name: String!, description: String, epsgCode: Int!, displayUnit: LengthUnit!, combinedScaleFactor: Float, siteOriginLat: Float, siteOriginLon: Float, siteOriginRotationDeg: Float): Project!
	"""
	Imports a `.slx` archive as a new project in the caller's org. Editor role
	required.
	"""
	importProject(content: String!): Project!
	"""
	Updates mutable project fields. Editor role required.
	"""
	updateProject(id: UUID!, name: String, description: String, epsgCode: Int, displayUnit: LengthUnit, combinedScaleFactor: Float, siteOriginLat: Float, siteOriginLon: Float, siteOriginRotationDeg: Float): Project!
	"""
	Sets the project's default stakeout tolerances (values in canonical
	meters). These are copied into an as-built comparison's snapshot at run
	time and are overridable per import. Editor role required.
	"""
	setProjectTolerances(projectId: UUID!, tolHWarn: Float!, tolHFail: Float!, tolVWarn: Float!, tolVFail: Float!): Project!
	"""
	Permanently deletes a project: removes every uploaded file (DXF overlays,
	terrain, buildings) and all database rows (cascades to grid, control
	points, survey points, transforms, imports, groups, categories links).
	Nothing is left behind. Editor role required.
	"""
	deleteProject(id: UUID!): Boolean!
	"""
	Replaces a project's entire grid. Axis positions are given in `unit`.
	"""
	setGridAxes(projectId: UUID!, unit: LengthUnit!, axes: [GridAxisInput!]!): [GridAxis!]!
	"""
	Adds a control point. Coordinates are given in `unit` and stored as meters.
	"""
	addControlPoint(projectId: UUID!, label: String!, northing: Float!, easting: Float!, elevation: Float, gridX: Float, gridY: Float, unit: LengthUnit!, source: String): ControlPoint!
	"""
	Updates a control point. Coordinate fields, when provided, are in `unit`.
	"""
	updateControlPoint(id: UUID!, label: String, northing: Float, easting: Float, elevation: Float, gridX: Float, gridY: Float, unit: LengthUnit!, source: String): ControlPoint!
	"""
	Deletes a control point in the caller's organization. Editor role required.
	"""
	deleteControlPoint(id: UUID!): Boolean!
	"""
	Solves the Helmert transform from the project's control points (those with
	grid coordinates) and persists it. Editor role required.
	"""
	solveTransform(projectId: UUID!): Transform!
	"""
	Creates a custom point category for the caller's organization.
	"""
	createCategory(name: String!, color: String!, icon: String!): PointCategory!
	"""
	Deletes a custom (non-default) category. Points in it are uncategorized.
	"""
	deleteCategory(id: UUID!): Boolean!
	"""
	Imports points from CSV or LandXML content. Coordinates in `unit` are
	stored as meters. Optionally tags all points with a category and saves
	the CSV mapping as a reusable profile.
	"""
	importPoints(projectId: UUID!, format: ImportFormat!, content: String!, unit: LengthUnit!, mapping: CsvMappingInput, sourceFilename: String, categoryId: UUID, saveProfileName: String): ImportBatch!
	"""
	Adds a single surveyed point manually (outside of an import). The input
	coordinate may be given in any `space` — projected easting/northing,
	geographic longitude/latitude, or building-grid X/Y — and is converted to
	the canonical projected (grid) value for storage. `x`/`y` are in `unit`
	except for geographic input, where they are degrees (x = lon, y = lat).
	Editor role required.
	"""
	addSurveyPoint(projectId: UUID!, label: String!, space: CoordinateSpace!, x: Float!, y: Float!, elevation: Float, description: String, categoryId: UUID, tags: [String!], unit: LengthUnit!): SurveyPoint!
	"""
	Updates a surveyed point's organizational fields (label, description,
	category, tags). Editor role required.
	"""
	updateSurveyPoint(id: UUID!, label: String, description: String, categoryId: UUID, tags: [String!]): SurveyPoint!
	"""
	Deletes a surveyed point. Editor role required.
	"""
	deleteSurveyPoint(id: UUID!): Boolean!
	"""
	Bulk-deletes surveyed points (org-scoped). Returns how many were deleted.
	Editor role required.
	"""
	deleteSurveyPoints(ids: [UUID!]!): Int!
	"""
	Bulk-assigns (or clears, when `categoryId` is null) the category of
	surveyed points (org-scoped). Returns how many were updated. Editor role.
	"""
	assignCategory(ids: [UUID!]!, categoryId: UUID): Int!
	"""
	Saves a named selection of points. Editor role required.
	"""
	createPointGroup(projectId: UUID!, name: String!, memberIds: [UUID!]!): PointGroup!
	"""
	Deletes a point group. Editor role required.
	"""
	deletePointGroup(id: UUID!): Boolean!
	"""
	Adds points to an existing group (union, de-duplicated). Editor role.
	"""
	addPointsToGroup(groupId: UUID!, memberIds: [UUID!]!): PointGroup!
	"""
	Uploads a DXF file: stores the raw text and creates an overlay record
	(defaulting to real-world georeferencing). Editor role required.
	"""
	uploadDxf(projectId: UUID!, filename: String!, content: String!): CadOverlay!
	"""
	Updates an overlay's georeference / visibility. Editor role required.
	"""
	setCadGeoreference(id: UUID!, offsetE: Float, offsetN: Float, rotationDeg: Float, scale: Float, elevation: Float, assumeRealWorld: Boolean, visible: Boolean): CadOverlay!
	"""
	Deletes an overlay and its stored file. Editor role required.
	"""
	deleteCadOverlay(id: UUID!): Boolean!
	"""
	Fetches (if needed) and caches the OpenTopography DEM for a project's
	bbox. Lazy: a cached terrain is reused unless `force`. A forced refresh is
	blocked for 7 days after the last fetch (OpenTopography is rate-limited).
	The DEM is fetched server-side here; the API key never reaches the client.
	"""
	refreshTerrain(projectId: UUID!, south: Float!, north: Float!, west: Float!, east: Float!, demtype: String, force: Boolean): ProjectTerrain!
	"""
	Fetches (if needed) and caches OSM building footprints for the bbox from
	the free Overpass API. Same 7-day cooldown as terrain. Visual context only.
	"""
	refreshBuildings(projectId: UUID!, south: Float!, north: Float!, west: Float!, east: Float!, force: Boolean): ProjectBuildings!
	"""
	Sniffs an uploaded file's format (base64) for the import UI.
	"""
	detectFieldFormat(contentBase64: String!): DetectedFormat!
	"""
	Decodes an as-built file, compares it to a design baseline, snapshots the
	result, and returns the new batch. Coordinates arrive in `space`/`unit`
	(default projected-ground / US survey foot); CSV requires a `presetId`.
	"""
	importAsBuilt(projectId: UUID!, contentBase64: String!, filename: String, format: FieldFormat, presetId: String, space: ExportSpace, unit: LengthUnit, baselineScope: BaselineScope, baselineRefId: UUID, tolOverride: ToleranceInput, reportUnit: LengthUnit): AsBuiltBatch!
	"""
	Manually re-pairs an as-built row to a chosen design point and recomputes
	that row's deltas against the (snapshotted) as-built coords + batch tolerance.
	"""
	repairComparison(batchId: UUID!, asBuiltCompId: UUID!, designPointId: UUID!): ComparisonRow!
	"""
	Deletes an as-built batch and its comparison rows (cascade). Editor role.
	"""
	deleteAsBuiltBatch(batchId: UUID!): Boolean!
	"""
	Creates a run with snapshotted vertices; logs a `create` audit entry.
	"""
	createUtilityRun(projectId: UUID!, input: UtilityRunInput!, vertices: [UtilityVertexInput!]!): UtilityRun!
	"""
	Updates a run's attributes (omitted fields keep their value); audited.
	"""
	updateUtilityRun(id: UUID!, input: UtilityRunInput!): UtilityRun!
	"""
	Replaces a run's geometry (re-snapshots vertices); audited.
	"""
	updateUtilityRunGeometry(id: UUID!, vertices: [UtilityVertexInput!]!): UtilityRun!
	"""
	Creates a structure; audited.
	"""
	createUtilityStructure(projectId: UUID!, input: UtilityStructureInput!): UtilityStructure!
	"""
	Updates a structure (omitted fields keep their value); audited.
	"""
	updateUtilityStructure(id: UUID!, input: UtilityStructureInput!): UtilityStructure!
	"""
	Soft-deletes a run (audited).
	"""
	deleteUtilityRun(id: UUID!): Boolean!
	"""
	Soft-deletes a structure (audited).
	"""
	deleteUtilityStructure(id: UUID!): Boolean!
	"""
	Imports pre-drawn linework (base64 DXF / GeoJSON) as audited runs +
	structures, using a confirmed layer→type mapping. `space` is "geographic"
	(lon/lat, reprojected to the project CRS) or "projected" (easting/northing
	in `unit`). Unmapped layers are skipped. Crew-gated, editor role.
	"""
	importUtilities(projectId: UUID!, format: String!, contentBase64: String!, mappings: [UtilityLayerMapping!]!, space: String!, unit: LengthUnit!, source: String): UtilityImportResult!
	"""
	Starts a hosted Stripe Checkout for the Crew plan; returns the redirect URL
	the client sends the browser to. Admin-only.
	"""
	createCheckoutSession(interval: BillingInterval!): String!
	"""
	Opens the Stripe Customer Portal (manage card / cancel / invoices); returns
	the redirect URL. Admin-only.
	"""
	createBillingPortalSession: String!
}

"""
ISO 8601 calendar date without timezone.
Format: %Y-%m-%d

# Examples

* `1994-11-13`
* `2000-02-24`
"""
scalar NaiveDate

"""
An organization as exposed over GraphQL.
"""
type Org {
	id: UUID!
	name: String!
	createdAt: DateTime!
}

"""
An org member for the admin user-management roster, with a derived status.
"""
type OrgMember {
	id: UUID!
	email: String!
	role: Role!
	"""
	Derived: `active` (verified), `pending` (invite not yet accepted), or
	`unverified` (signed up but email not verified).
	"""
	status: String!
	createdAt: DateTime!
}

"""
The subscription plans. Binary today: free `Solo` vs paid `Crew`.
"""
enum Plan {
	"""
	Free tier.
	"""
	SOLO
	"""
	Paid tier.
	"""
	CREW
}

"""
The static plan → capability catalog: the single source of truth for what each
plan unlocks. The web renders upgrade UI + selling points from this instead of
hard-coding feature lists.
"""
type PlanCatalog {
	features: [PlanFeature!]!
	plans: [PlanLimits!]!
}

"""
A gated feature in the plan catalog (static metadata; drives the web's upgrade
dialogs + selling points). See `crate::plan`.
"""
type PlanFeature {
	"""
	Stable snake_case id (upgrade dialogs key off this).
	"""
	key: String!
	label: String!
	blurb: String!
	minPlan: Plan!
}

"""
A plan's usage caps (`-1` = unlimited).
"""
type PlanLimits {
	plan: Plan!
	maxProjects: Int!
	maxAdmins: Int!
	maxNonAdmin: Int!
}

"""
A point category (color/icon). Default set is seeded per org; orgs add custom.
"""
type PointCategory {
	id: UUID!
	orgId: UUID!
	name: String!
	color: String!
	icon: String!
	isDefault: Boolean!
}

"""
A saved named selection of points.
"""
type PointGroup {
	id: UUID!
	projectId: UUID!
	name: String!
	memberIds: [UUID!]!
}

"""
A building site. All stored coordinates are canonical meters.
"""
type Project {
	id: UUID!
	orgId: UUID!
	name: String!
	description: String!
	epsgCode: Int!
	displayUnit: LengthUnit!
	combinedScaleFactor: Float!
	siteOriginLat: Float
	siteOriginLon: Float
	"""
	Rotation (degrees, CCW) applied about the site origin to georeference an
	assumed-datum survey to true earth. 0 for properly-tied projects.
	"""
	siteOriginRotationDeg: Float!
	"""
	Default stakeout tolerances (meters, canonical): horizontal/vertical
	warn + fail thresholds, copied into an as-built comparison at run time.
	"""
	tolHWarn: Float!
	tolHFail: Float!
	tolVWarn: Float!
	tolVFail: Float!
	createdAt: DateTime!
	updatedAt: DateTime!
}

"""
Cached OpenStreetMap building footprints for a project (the footprint JSON
lives in storage; `storage_key` is intentionally not exposed via GraphQL).
"""
type ProjectBuildings {
	projectId: UUID!
	count: Int!
	fetchedAt: DateTime!
}

"""
Cached OpenTopography DEM metadata for a project (the GeoTIFF bytes live in
storage; `storage_key` is intentionally not exposed via GraphQL).
"""
type ProjectTerrain {
	projectId: UUID!
	demtype: String!
	south: Float!
	north: Float!
	west: Float!
	east: Float!
	fetchedAt: DateTime!
}

"""
Public, non-secret runtime config the client needs (e.g. the shared Cesium
Ion token used for World Terrain — Ion tokens are client-exposed by design).
"""
type PublicConfig {
	cesiumIonToken: String!
}

"""
The GraphQL query root — a merge of the per-domain query objects.
"""
type QueryRoot {
	"""
	Liveness check.
	"""
	health: String!
	"""
	Database connectivity check.
	"""
	dbStatus: String!
	"""
	Whether the server is in `MAIL_CAPTURE` mode (test/e2e). Lets clients skip
	mail-dependent flows when capture isn't available.
	"""
	mailCaptureEnabled: Boolean!
	"""
	Test-only: emails captured while `MAIL_CAPTURE` is enabled (newest first),
	optionally filtered by recipient substring. Always empty in normal/prod
	operation, so no message contents are ever exposed there. Lets e2e assert
	the mail path ran and extract links without spending email quota.
	"""
	sentEmails(to: String): [SentEmail!]!
	"""
	Public runtime config the client needs (e.g. the shared Cesium Ion token).
	"""
	publicConfig: PublicConfig!
	"""
	The currently authenticated user, or null if not logged in.
	"""
	me: User
	"""
	All users in the caller's organization. Admin only.
	"""
	users: [User!]!
	"""
	The caller's organization (id, name). Used by the settings page and the
	type-to-confirm delete flow.
	"""
	organization: Org!
	"""
	Org roster for the admin user-management page, with a derived status.
	"""
	orgMembers: [OrgMember!]!
	"""
	All projects in the caller's organization.
	"""
	projects: [Project!]!
	"""
	A single project by id, scoped to the caller's organization.
	"""
	project(id: UUID!): Project
	"""
	Exports a project as a self-contained `.slx` archive (JSON text) with all
	of its authored data. Re-import with `importProject`.
	"""
	projectExport(projectId: UUID!): String!
	"""
	The grid axes for a project, ordered by family then position.
	"""
	gridAxes(projectId: UUID!): [GridAxis!]!
	"""
	The control points for a project.
	"""
	controlPoints(projectId: UUID!): [ControlPoint!]!
	"""
	The persisted Helmert transform for a project, if one has been solved.
	"""
	transform(projectId: UUID!): Transform
	"""
	The caller organization's point categories (defaults + custom).
	"""
	categories: [PointCategory!]!
	"""
	Surveyed points for a project, optionally filtered by free-text search
	(label/description/tags) and/or category. Paginated: `limit` is clamped to
	[1, 1000] (default 200) so the list query is always bounded.
	"""
	surveyPoints(projectId: UUID!, search: String, categoryId: UUID, groupId: UUID, limit: Int, offset: Int, sort: String, descending: Boolean): [SurveyPoint!]!
	"""
	Total count of surveyed points matching the same filters as `surveyPoints`.
	Lets the UI paginate without fetching every row.
	"""
	surveyPointCount(projectId: UUID!, search: String, categoryId: UUID, groupId: UUID): Int!
	"""
	Import batches for a project.
	"""
	importBatches(projectId: UUID!): [ImportBatch!]!
	"""
	Saved CSV import profiles for a project.
	"""
	importProfiles(projectId: UUID!): [ImportProfile!]!
	"""
	Saved point groups (named selections) for a project.
	"""
	pointGroups(projectId: UUID!): [PointGroup!]!
	"""
	DXF overlays for a project. DXF is a Crew feature: non-paid orgs simply see
	no overlays (empty list) so the bundled scene query still loads — the upload
	path is what's gated with an upgrade prompt.
	"""
	cadOverlays(projectId: UUID!): [CadOverlay!]!
	"""
	The raw DXF text of an overlay (kept for export / debugging).
	"""
	cadOverlayContent(id: UUID!): String!
	"""
	The overlay parsed into layer-grouped polylines (server-side DXF codec),
	for the 3D scene to render without shipping a DXF parser to the browser.
	"""
	cadOverlayGeometry(id: UUID!): DxfGeometry!
	"""
	Cached OpenTopography terrain metadata for a project (null until first
	fetched). Drives the "Refresh terrain" 7-day cooldown on the client.
	"""
	projectTerrain(projectId: UUID!): ProjectTerrain
	"""
	Base64-encoded cached DEM GeoTIFF for the project's terrain.
	"""
	projectTerrainContent(projectId: UUID!): String!
	"""
	Cached OSM buildings metadata for a project (null when none fetched yet).
	"""
	projectBuildings(projectId: UUID!): ProjectBuildings
	"""
	The cached building footprints as a JSON string:
	`[{"poly":[[lat,lon],...],"height":<m>}, ...]`.
	"""
	projectBuildingsContent(projectId: UUID!): String!
	"""
	Converts a coordinate (given in `unit`, in the named `space`) into every
	derivable representation: grid, projected (grid + ground), and geographic.
	"""
	convertCoordinate(projectId: UUID!, space: CoordinateSpace!, x: Float!, y: Float!, unit: LengthUnit!): CoordinateSet!
	"""
	Searches the EPSG coordinate-reference-system catalog by code or name.
	"""
	searchEpsg(query: String!, limit: Int): [EpsgEntry!]!
	"""
	Exports points as CSV or LandXML in a chosen space + unit + column order.
	Filter by explicit `pointIds` and/or `categoryId` (all points if neither).
	"""
	exportPoints(projectId: UUID!, format: ExportFormat!, space: ExportSpace!, unit: LengthUnit!, columns: [ExportColumn!], pointIds: [UUID!], categoryId: UUID): String!
	"""
	Everything the 3D viewer needs, pre-projected to geographic coordinates.
	"""
	sceneData(projectId: UUID!): SceneData!
	"""
	The curated field-app export presets, for the export picker.
	"""
	fieldExportPresets: [FieldPresetInfo!]!
	"""
	Encodes the project's points in a field-app preset's native format,
	returning a downloadable blob. Space and unit default to the preset's.
	Filter by explicit `pointIds` and/or `categoryId` (all points if neither).
	"""
	exportField(projectId: UUID!, presetId: String!, space: ExportSpace, unit: LengthUnit, pointIds: [UUID!], categoryId: UUID, codeField: CodeField): FieldExportResult!
	"""
	All as-built comparison batches for a project (newest first).
	"""
	asBuiltBatches(projectId: UUID!): [AsBuiltBatch!]!
	"""
	A single comparison: batch metadata + per-point rows + summary stats.
	"""
	comparison(batchId: UUID!): Comparison!
	"""
	The stakeout comparison as a downloadable CSV (report unit).
	"""
	comparisonReportCsv(batchId: UUID!): FileBlob!
	"""
	The stakeout comparison as a downloadable PDF (rendered by the shared
	WeasyPrint report service).
	"""
	comparisonReportPdf(batchId: UUID!): FileBlob!
	"""
	The curated (APWA) utility type catalog.
	"""
	utilityTypes: [UtilityType!]!
	"""
	The project's utility inventory (runs + structures), filtered. When
	`limit` is set, the combined run+structure list is server-paginated by
	capture time (mirrors the survey-points table); pair it with `utilityCount`.
	"""
	utilities(projectId: UUID!, typeKey: String, level: String, search: String, limit: Int, offset: Int): UtilityInventory!
	"""
	Combined count of runs + structures matching the inventory filters (for
	paging the inventory table).
	"""
	utilityCount(projectId: UUID!, typeKey: String, level: String, search: String): Int!
	"""
	A single run (with vertices + derived length/slope).
	"""
	utility(id: UUID!): UtilityRun!
	"""
	A single structure.
	"""
	utilityStructure(id: UUID!): UtilityStructure!
	"""
	The change history for a project (optionally a single entity), newest first.
	"""
	utilityAudit(projectId: UUID!, entityId: UUID): [UtilityAuditEntry!]!
	"""
	Parse an import file (base64 DXF / GeoJSON) and return its layers with
	auto-suggested APWA types, for the mapping UI. Read-only; nothing is saved.
	"""
	previewUtilityImport(projectId: UUID!, format: String!, contentBase64: String!): UtilityImportPreview!
	"""
	Export the utility archive as a portable file. `format` ∈
	geojson|dxf|landxml|pdf; `type_key` optionally scopes to one type.
	GeoJSON is WGS84; DXF/LandXML/PDF use projected meters. Crew-gated.
	"""
	exportUtilities(projectId: UUID!, format: String!, typeKey: String, search: String): FileBlob!
	"""
	The caller org's plan, subscription status, usage, and limits.
	"""
	billing: BillingInfo!
	"""
	The static plan/feature catalog. No auth required — it's marketing/gating
	metadata, safe to render on public pricing surfaces.
	"""
	planCatalog: PlanCatalog!
}

"""
In-org role. The string values match the `users.role` CHECK constraint.
"""
enum Role {
	ADMIN
	SURVEYOR
	VIEWER
}

"""
Everything the 3D viewer needs, pre-projected to geographic coordinates.
"""
type SceneData {
	origin: LatLng
	"""
	The origin's projected easting/northing (meters) — lets the client place
	DXF overlays in a local east-north frame anchored at the origin.
	"""
	originProjectedE: Float
	originProjectedN: Float
	"""
	Site rotation (degrees, CCW about the origin) already applied to the points
	and grid below. The client reuses it to rotate DXF overlays — which it
	places in the projected frame itself — so overlays track the survey.
	"""
	siteRotationDeg: Float!
	controlPoints: [ScenePoint!]!
	surveyPoints: [ScenePoint!]!
	gridLines: [SceneLine!]!
	utilityRuns: [SceneUtilityRun!]!
	utilityStructures: [SceneUtilityStructure!]!
}

"""
A renderable polyline (e.g. a grid axis) in geographic coordinates.
"""
type SceneLine {
	label: String!
	coordinates: [LatLng!]!
}

"""
A renderable point in geographic coordinates. `easting`/`northing` (meters)
are carried so the client can open the coordinate inspector from a 3D pick.
"""
type ScenePoint {
	id: UUID
	label: String!
	latitude: Float!
	longitude: Float!
	height: Float!
	easting: Float!
	northing: Float!
	categoryId: UUID
}

"""
A utility run for the 3D scene: a polyline of geographic vertices (height =
invert/centerline Z, meters) drawn as a diameter-sized tube in its APWA color.
"""
type SceneUtilityRun {
	id: UUID!
	typeKey: String!
	label: String!
	apwaColor: String!
	"""
	Outer diameter in meters (tube radius = diameter / 2), if known.
	"""
	diameter: Float
	vertices: [LatLng!]!
}

"""
A utility structure for the 3D scene: a node drawn as a solid at its position,
with `rim_elev` (top, meters) driving its height.
"""
type SceneUtilityStructure {
	id: UUID!
	typeKey: String!
	label: String!
	apwaColor: String!
	latitude: Float!
	longitude: Float!
	rimElev: Float
	easting: Float!
	northing: Float!
}

"""
A captured email surfaced by `sentEmails` in `MAIL_CAPTURE` mode (test/e2e).
"""
type SentEmail {
	to: String!
	subject: String!
	"""
	Plain-text body — carries any verification/reset/invite link.
	"""
	text: String!
}

"""
Result returned from signup. The verification token is surfaced here only
because no email provider is wired yet (deferred); it will be delivered by
email in a later phase.
"""
type SignupResult {
	user: User!
	org: Org!
	verificationToken: String!
}

type SubscriptionRoot {
	"""
	Emits a ping (the project id) each time the project's scene changes —
	points, control points, grid, overlays, terrain/buildings, transform, or
	georeference. The payload is intentionally minimal; clients refetch the
	scene on the ping. Authenticated via the session cookie sent on the
	WebSocket upgrade; only members of the project's organization may subscribe.
	"""
	projectChanged(projectId: UUID!): UUID!
}

"""
A surveyed point. Coordinates are meters; one category + free-text tags.
"""
type SurveyPoint {
	id: UUID!
	projectId: UUID!
	label: String!
	northing: Float!
	easting: Float!
	elevation: Float
	description: String!
	categoryId: UUID
	tags: [String!]!
	importBatchId: UUID
}

"""
Optional per-import tolerance override (canonical meters).
"""
input ToleranceInput {
	hWarn: Float!
	hFail: Float!
	vWarn: Float!
	vFail: Float!
}

"""
A solved Helmert transform. Translations/RMS are meters; rotation in degrees.
"""
type Transform {
	translationE: Float!
	translationN: Float!
	rotationDegrees: Float!
	scale: Float!
	rmsError: Float!
	pointCount: Int!
	residuals: [TransformResidual!]!
}

"""
Per-point transform residual (observed − computed), in meters.
"""
type TransformResidual {
	label: String!
	deltaEasting: Float!
	deltaNorthing: Float!
	magnitude: Float!
}

"""
A UUID is a unique 128-bit number, stored as 16 octets. UUIDs are parsed as
Strings within GraphQL. UUIDs are used to assign unique identifiers to
entities without requiring a central allocating authority.

# References

* [Wikipedia: Universally Unique Identifier](http://en.wikipedia.org/wiki/Universally_unique_identifier)
* [RFC4122: A Universally Unique Identifier (UUID) URN Namespace](http://tools.ietf.org/html/rfc4122)
"""
scalar UUID

"""
A user as exposed over GraphQL. Never carries the password hash or tokens.
"""
type User {
	id: UUID!
	orgId: UUID!
	email: String!
	role: Role!
	emailVerified: Boolean!
	createdAt: DateTime!
}

"""
One append-only audit entry (field-level `diff` as a JSON object string).
"""
type UtilityAuditEntry {
	id: UUID!
	entityType: String!
	entityId: UUID!
	action: String!
	changedBy: UUID
	changedAt: DateTime!
	diff: String!
}

"""
One source layer/group in an import file, with an auto-suggested APWA type.
"""
type UtilityImportLayer {
	layer: String!
	"""
	"line" (→ run) or "point" (→ structure).
	"""
	kind: String!
	count: Int!
	suggestedType: String
}

"""
Preview of an import file: its layers, for the mapping UI.
"""
type UtilityImportPreview {
	layers: [UtilityImportLayer!]!
}

"""
Result of committing an import.
"""
type UtilityImportResult {
	runsCreated: Int!
	structuresCreated: Int!
	skipped: Int!
}

"""
A project's utility inventory (filtered runs + structures).
"""
type UtilityInventory {
	runs: [UtilityRun!]!
	structures: [UtilityStructure!]!
}

"""
A user-confirmed layer→type mapping. `type_key` null/empty = skip the layer.
"""
input UtilityLayerMapping {
	layer: String!
	"""
	Matches the preview `kind` ("line" | "point").
	"""
	kind: String!
	typeKey: String
}

"""
A linear utility run with typed attributes + snapshotted geometry.
"""
type UtilityRun {
	id: UUID!
	projectId: UUID!
	typeKey: String!
	label: String!
	level: String
	"""
	Diameter in canonical meters (entered in inches).
	"""
	diameter: Float
	material: String
	invertUp: Float
	invertDown: Float
	slope: Float
	owner: String
	installDate: NaiveDate
	condition: String
	"""
	Free-form attributes as a JSON object string.
	"""
	attrsExtra: String!
	tags: [String!]!
	source: String!
	asBuiltDate: NaiveDate
	locateMethod: String
	capturedAt: DateTime!
	createdAt: DateTime!
	updatedAt: DateTime!
	vertices: [UtilityVertex!]!
	"""
	Derived 3D length (meters) from the vertices.
	"""
	length: Float
}

"""
Run attributes on create/update. All optional; on update, omitted fields keep
their current value. `diameter_inches` is stored canonical (meters).
"""
input UtilityRunInput {
	typeKey: String
	label: String
	level: String
	diameterInches: Float
	material: String
	invertUp: Float
	invertDown: Float
	owner: String
	installDate: NaiveDate
	condition: String
	"""
	JSON object string.
	"""
	attrsExtra: String
	tags: [String!]
	source: String
	asBuiltDate: NaiveDate
	locateMethod: String
}

"""
A node structure (manhole, valve, hydrant, …).
"""
type UtilityStructure {
	id: UUID!
	projectId: UUID!
	typeKey: String!
	label: String!
	level: String
	northing: Float!
	easting: Float!
	rimElev: Float
	"""
	Pipe inverts as a JSON array string: `[{label, elev, pipe?}]`.
	"""
	inverts: String!
	material: String
	owner: String
	condition: String
	attrsExtra: String!
	tags: [String!]!
	source: String!
	asBuiltDate: NaiveDate
	locateMethod: String
	sourcePointId: UUID
	capturedAt: DateTime!
	createdAt: DateTime!
	updatedAt: DateTime!
}

"""
Structure attributes on create/update. Position is required on create.
"""
input UtilityStructureInput {
	typeKey: String
	label: String
	level: String
	northing: Float
	easting: Float
	rimElev: Float
	"""
	JSON array string.
	"""
	inverts: String
	material: String
	owner: String
	condition: String
	attrsExtra: String
	tags: [String!]
	source: String
	asBuiltDate: NaiveDate
	locateMethod: String
	sourcePointId: UUID
}

"""
A curated utility type (APWA-aligned). `default_geometry` ∈ line|structure|both.
"""
type UtilityType {
	key: String!
	label: String!
	apwaColor: String!
	defaultGeometry: String!
}

"""
One ordered vertex of a run (canonical meters). `source_point_id` is a
provenance-only soft link to the survey point it was snapped from.
"""
type UtilityVertex {
	seq: Int!
	northing: Float!
	easting: Float!
	elevation: Float
	sourcePointId: UUID
}

"""
One vertex on capture. `seq` is the array position; coords are canonical meters.
"""
input UtilityVertexInput {
	northing: Float!
	easting: Float!
	elevation: Float
	sourcePointId: UUID
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Provides a scalar specification URL for specifying the behavior of custom scalar types.
"""
directive @specifiedBy(url: String!) on SCALAR
schema {
	query: QueryRoot
	mutation: MutationRoot
	subscription: SubscriptionRoot
}
