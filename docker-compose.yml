# Production stack (Dokploy uses `-f docker-compose.yml`, skipping the override).
# No host port mappings here — Traefik routes to the `web` service on its
# internal network. Local host ports live in docker-compose.override.yml.
services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Ephemeral cache (rate-limit counters only) — no persistence needed.
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      STORAGE_DIR: ${STORAGE_DIR}
      CESIUM_ION_TOKEN: ${CESIUM_ION_TOKEN:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SITELENS_MAIL_FROM: ${SITELENS_MAIL_FROM:-SiteLens <noreply@msalia.org>}
      APP_URL: ${APP_URL:-http://localhost:3000}
      # Set MAIL_CAPTURE=1 (e.g. for e2e) to record emails in memory instead of
      # sending — no provider quota used; readable via the `sentEmails` query.
      MAIL_CAPTURE: ${MAIL_CAPTURE:-}
      # Shared WeasyPrint report service (foundation §8).
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL:-http://report:8000}
    volumes:
      - uploads:${STORAGE_DIR}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      report:
        condition: service_healthy

  # Stateless HTML->PDF renderer (WeasyPrint) shared by the feature suite.
  report:
    build: ./report
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./web
    restart: unless-stopped
    env_file: .env
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL}
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
